<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scrabble Scanner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #fff;
         touch-action: manipulation; }

  .camera-wrap {
    position: relative;
    width: 100vw;
    max-width: 600px;
    margin: 0 auto;
    aspect-ratio: 1;
    background: #000;
    border: 4px solid transparent;
    transition: border-color 0.4s ease;
  }
  .camera-wrap video, .camera-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  .camera-wrap canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .controls {
    display: flex; gap: 10px; justify-content: center;
    padding: 14px; flex-wrap: wrap;
  }
  button {
    padding: 12px 24px; font-size: 15px; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
    background: #4CAF50; color: #fff;
  }
  button:disabled { opacity: 0.4; }
  button.secondary { background: #555; }
  button.blue { background: #2196F3; }
  button.red { background: #c0392b; }

  .status { text-align: center; padding: 8px; font-size: 14px; color: #aaa; }

  .board-section {
    max-width: 600px; margin: 0 auto; padding: 8px; display: none;
  }
  .board-section.visible { display: block; }
  .board-grid {
    display: grid; grid-template-columns: repeat(15, 1fr);
    gap: 1px; background: #333; border: 2px solid #555;
  }
  .board-grid input {
    width: 100%; aspect-ratio: 1; text-align: center;
    font-size: min(3.5vw, 18px); font-weight: 700;
    border: 2px solid transparent; padding: 0;
    background: #3a3a3a; color: #888;
    caret-color: transparent;
  }
  .board-grid input.has-tile { background: #f0f0f0; color: #111; }
  .board-grid input.conf-low { background: #fff3cd; color: #664d03; }
  .board-grid input.conf-vlow { background: #f8d7da; color: #842029; }
  .board-grid input.blank { font-style: italic; font-weight: 400; position: relative; }
  .board-grid input:focus { outline: none; }
  .board-grid input.selected { border: 3px solid #2196F3; z-index: 1; }

  .stats { text-align: center; padding: 12px; font-size: 13px; color: #888; }
  #file-input { display: none; }
  .readiness-score { text-align: center; font-size: 12px; color: #666; padding: 2px; }

  .saved-boards { max-width: 600px; margin: 0 auto; padding: 8px; display: none; }
  .saved-boards.visible { display: block; }
  .saved-boards h3 { text-align: center; padding: 10px; font-size: 16px; }
  .saved-list { display: flex; flex-direction: column; gap: 8px; }
  .saved-item {
    display: flex; align-items: center; gap: 10px; padding: 10px;
    background: #2a2a2a; border-radius: 8px; cursor: pointer;
  }
  .saved-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
  .saved-item .info { flex: 1; }
  .saved-item .info .name { font-weight: 600; font-size: 14px; }
  .saved-item .info .date { font-size: 12px; color: #888; }
  .saved-item .del-btn {
    background: none; border: none; color: #c0392b; font-size: 18px;
    cursor: pointer; padding: 8px;
  }
  button.small { padding: 8px 14px; font-size: 13px; }

  .board-hint {
    text-align: center; font-size: 12px; color: #999; padding: 6px 8px;
    max-width: 600px; margin: 0 auto;
  }
  .bottom-bar {
    display: none; justify-content: center; align-items: center; gap: 8px;
    padding: 8px 6px calc(8px + env(safe-area-inset-bottom, 0px));
    position: fixed; bottom: 0; left: 0; right: 0;
    border-top: 1px solid #444; z-index: 100;
  }
  .bottom-bar.visible { display: flex; }
  .bottom-bar button { padding: 10px 16px; font-size: 14px; min-height: 44px; }
  #view-bar { background: #222; }
  #edit-bar { background: #1a2a3a; }
  #edit-bar .edit-label { font-size: 12px; color: #8cf; margin-right: 4px; }
  .board-section { padding-bottom: 70px; }
  .save-dirty { background: #e67e22 !important; }
  #mobile-input {
    position: absolute; left: -9999px; opacity: 0;
    width: 1px; height: 1px;
  }
  .legend {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
    padding: 6px 8px; font-size: 11px; color: #999;
    max-width: 600px; margin: 0 auto;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-swatch {
    width: 14px; height: 14px; border-radius: 2px; border: 1px solid #555;
    display: inline-block;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="camera-wrap" id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <img id="preview-img" class="hidden" />
  <canvas id="overlay"></canvas>
</div>
<div class="readiness-score" id="readiness-score"></div>

<div class="controls" id="camera-controls">
  <button id="capture-btn" disabled>Capture</button>
  <button id="upload-btn" class="blue">Upload</button>
</div>

<div class="controls hidden" id="align-controls">
  <button id="scan-btn">Scan</button>
  <button id="retake-btn" class="secondary">Retake</button>
</div>

<div class="status" id="status">Starting camera...</div>

<input type="file" id="file-input" accept="image/*">

<div class="board-section" id="board-section">
  <div class="board-hint">Tap a cell to select. Type a letter to fill, backspace to clear.</div>
  <div class="board-grid" id="board-grid"></div>
  <div class="legend" id="board-legend">
    <span class="legend-item"><span class="legend-swatch" style="background:#f0f0f0"></span> High conf.</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#fff3cd"></span> Medium</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#f8d7da"></span> Low</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#f0f0f0;font-style:italic;font-size:10px;text-align:center;line-height:14px">a</span> Blank</span>
  </div>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <button id="copy-btn" class="blue small">Copy Board</button>
    <button id="download-btn" class="secondary small">Download JSON</button>
  </div>
</div>

<div class="bottom-bar" id="view-bar">
  <button id="new-scan-btn" class="secondary small">New Scan</button>
  <button id="save-btn">Save Board</button>
  <button id="review-btn" class="blue small">Review</button>
  <button id="view-saved-btn" class="secondary small">Saved</button>
</div>

<div class="bottom-bar" id="edit-bar">
  <span class="edit-label" id="edit-label">Editing</span>
  <button id="kb-btn" class="blue small">A-Z</button>
  <button id="blank-btn" class="secondary small">Blank</button>
  <button id="clear-btn" class="red small">Clear</button>
  <button id="done-btn" class="secondary small">Done</button>
</div>

<input id="mobile-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters">

<div class="saved-boards" id="saved-boards">
  <h3>Saved Boards</h3>
  <div class="saved-list" id="saved-list"></div>
  <div class="controls">
    <button id="back-from-saved" class="secondary">Back</button>
  </div>
</div>

<canvas id="capture-canvas" style="display:none"></canvas>

<script>
const $ = id => document.getElementById(id);
const video = $('video');
const previewImg = $('preview-img');
const overlay = $('overlay');
const captureBtn = $('capture-btn');
const uploadBtn = $('upload-btn');
const scanBtn = $('scan-btn');
const retakeBtn = $('retake-btn');
const newScanBtn = $('new-scan-btn');
const status = $('status');
const boardSection = $('board-section');
const boardGrid = $('board-grid');
const statsEl = $('stats');
const captureCanvas = $('capture-canvas');
const fileInput = $('file-input');
const cameraControls = $('camera-controls');
const alignControls = $('align-controls');
const cameraWrap = $('camera-wrap');
const readinessScoreEl = $('readiness-score');

let currentBlob = null;
let imageWidth = 0;
let imageHeight = 0;
// Corners in image coordinates: [TL, TR, BR, BL]
let corners = null;
let autoDetectedCorners = null; // corners from auto-detect before user adjustment
let dragging = -1;
const GRAB_RADIUS = 30;

function readinessColor(score) {
  if (score < 0.3) {
    const t = score / 0.3;
    return `rgb(255,${Math.round(255 * t)},0)`;
  } else if (score < 0.7) {
    const t = (score - 0.3) / 0.4;
    return `rgb(${Math.round(255 * (1 - t))},255,0)`;
  }
  return 'rgb(0,255,0)';
}

// ── State management ──

function showCamera() {
  video.classList.remove('hidden');
  previewImg.classList.add('hidden');
  cameraControls.classList.remove('hidden');
  alignControls.classList.add('hidden');
  boardSection.classList.remove('visible');
  $('saved-boards').classList.remove('visible');
  overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
  overlay.style.pointerEvents = 'none';
  corners = null;
  autoDetectedCorners = null;
  originalScanResult = null;
  currentBoardId = null;
  currentBlob = null;
  viewBar.classList.remove('visible');
  editBar.classList.remove('visible');
  setupOverlay();
  drawCameraGrid();
  cameraWrap.style.borderColor = 'transparent';
  readinessScoreEl.textContent = '';
  status.textContent = 'Align board with grid, then tap Capture';
}

function showAlign(imgUrl) {
  video.classList.add('hidden');
  previewImg.classList.remove('hidden');
  previewImg.src = imgUrl;
  cameraControls.classList.add('hidden');
  alignControls.classList.remove('hidden');
  boardSection.classList.remove('visible');
  overlay.style.pointerEvents = 'auto';
  status.textContent = 'Detecting board...';

  previewImg.onload = () => {
    setupOverlay();
    detectCorners();
  };
}

// ── Camera ──

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 1280 } }
    });
    video.srcObject = stream;
    video.addEventListener('loadedmetadata', () => {
      setupOverlay();
      drawCameraGrid();
      captureBtn.disabled = false;
      status.textContent = 'Align board with grid, then tap Capture';
    });
  } catch (e) {
    status.textContent = 'Camera unavailable — use Upload instead';
  }
}

function setupOverlay() {
  const wrap = $('camera-wrap');
  overlay.width = wrap.clientWidth;
  overlay.height = wrap.clientHeight;
}

function drawCameraGrid() {
  const ctx = overlay.getContext('2d');
  const w = overlay.width, h = overlay.height;
  ctx.clearRect(0, 0, w, h);

  const margin = Math.min(w, h) * 0.05;
  const size = Math.min(w, h) - margin * 2;
  const x0 = (w - size) / 2, y0 = (h - size) / 2;
  const cell = size / 15;

  ctx.strokeStyle = 'rgba(0, 255, 0, 0.35)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 15; i++) {
    ctx.beginPath(); ctx.moveTo(x0, y0 + i * cell); ctx.lineTo(x0 + size, y0 + i * cell); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x0 + i * cell, y0); ctx.lineTo(x0 + i * cell, y0 + size); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(0, 255, 0, 0.7)';
  ctx.lineWidth = 2;
  ctx.strokeRect(x0, y0, size, size);
}

// ── Capture ──

captureBtn.addEventListener('click', () => {
  const vw = video.videoWidth, vh = video.videoHeight;
  captureCanvas.width = vw;
  captureCanvas.height = vh;
  captureCanvas.getContext('2d').drawImage(video, 0, 0, vw, vh);
  captureCanvas.toBlob(blob => {
    currentBlob = blob;
    showAlign(URL.createObjectURL(blob));
  }, 'image/jpeg', 0.92);
});

uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) {
    currentBlob = file;
    showAlign(URL.createObjectURL(file));
  }
  fileInput.value = '';
});

retakeBtn.addEventListener('click', showCamera);
newScanBtn.addEventListener('click', showCamera);

// ── Corner detection ──

async function detectCorners() {
  const form = new FormData();
  form.append('file', currentBlob, 'capture.jpg');

  try {
    const res = await fetch('/api/detect-corners', { method: 'POST', body: form });
    const data = await res.json();
    imageWidth = data.image_width;
    imageHeight = data.image_height;
    corners = data.corners; // [[x,y], ...] TL, TR, BR, BL in image coords
    autoDetectedCorners = data.detected ? corners.map(c => [...c]) : null;
    drawAlignOverlay();
    status.textContent = data.detected
      ? 'Align grid to board lines, then tap Scan'
      : 'Auto-detect failed — drag grid corners to align';
  } catch (e) {
    console.error('Corner detection error:', e);
    status.textContent = 'Detection failed — drag grid corners to align';
    // Default to full image
    const img = previewImg;
    imageWidth = img.naturalWidth || 1;
    imageHeight = img.naturalHeight || 1;
    corners = [[0, 0], [imageWidth, 0], [imageWidth, imageHeight], [0, imageHeight]];
    autoDetectedCorners = null;
    drawAlignOverlay();
  }
}

// ── Coordinate helpers ──

function imgToCanvas(ix, iy) {
  return [ix / imageWidth * overlay.width, iy / imageHeight * overlay.height];
}

function canvasToImg(cx, cy) {
  return [cx / overlay.width * imageWidth, cy / overlay.height * imageHeight];
}

// ── Homography-based perspective grid ──

function computeHomography(src, dst) {
  // Compute 3x3 homography mapping 4 src points to 4 dst points.
  // src/dst: [[x0,y0],[x1,y1],[x2,y2],[x3,y3]]
  // Solves Ah=0 via 8x9 system reduced to 8x8 by fixing h[8]=1.
  const A = [];
  for (let i = 0; i < 4; i++) {
    const [xs, ys] = src[i];
    const [xd, yd] = dst[i];
    A.push([xs, ys, 1, 0, 0, 0, -xd*xs, -xd*ys, -xd]);
    A.push([0, 0, 0, xs, ys, 1, -yd*xs, -yd*ys, -yd]);
  }
  // Solve 8x8 system (set h8=1, move last column to RHS)
  const M = [], b = [];
  for (let i = 0; i < 8; i++) {
    M.push(A[i].slice(0, 8));
    b.push(-A[i][8]);
  }
  // Gaussian elimination with partial pivoting
  for (let col = 0; col < 8; col++) {
    let maxRow = col, maxVal = Math.abs(M[col][col]);
    for (let row = col + 1; row < 8; row++) {
      if (Math.abs(M[row][col]) > maxVal) { maxVal = Math.abs(M[row][col]); maxRow = row; }
    }
    [M[col], M[maxRow]] = [M[maxRow], M[col]];
    [b[col], b[maxRow]] = [b[maxRow], b[col]];
    const pivot = M[col][col];
    if (Math.abs(pivot) < 1e-12) return null;
    for (let j = col; j < 8; j++) M[col][j] /= pivot;
    b[col] /= pivot;
    for (let row = 0; row < 8; row++) {
      if (row === col) continue;
      const f = M[row][col];
      for (let j = col; j < 8; j++) M[row][j] -= f * M[col][j];
      b[row] -= f * b[col];
    }
  }
  return [b[0], b[1], b[2], b[3], b[4], b[5], b[6], b[7], 1];
}

function applyHomography(H, x, y) {
  const w = H[6]*x + H[7]*y + H[8];
  return [(H[0]*x + H[1]*y + H[2]) / w, (H[3]*x + H[4]*y + H[5]) / w];
}

let _homography = null;

function getHomography() {
  // Maps grid coords (0..15, 0..15) to image coords
  // TL=(0,0), TR=(15,0), BR=(15,15), BL=(0,15) → corners[0..3]
  const src = [[0,0], [15,0], [15,15], [0,15]];
  const dst = corners;
  return computeHomography(src, dst);
}

function gridToCanvas(gx, gy) {
  if (!_homography) return [0, 0];
  const [ix, iy] = applyHomography(_homography, gx, gy);
  return imgToCanvas(ix, iy);
}

function drawGridLine(ctx, points) {
  ctx.beginPath();
  for (let i = 0; i < points.length; i++) {
    const [x, y] = points[i];
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function drawAlignOverlay() {
  const ctx = overlay.getContext('2d');
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  if (!corners) return;

  _homography = getHomography();
  if (!_homography) return;

  const SEGS = 10; // points per grid line for smooth curves

  // Inner grid lines (cell boundaries)
  ctx.strokeStyle = 'rgba(0, 255, 0, 0.4)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 15; i++) {
    // Horizontal line at y=i
    const hPts = [];
    for (let s = 0; s <= SEGS; s++) hPts.push(gridToCanvas(s / SEGS * 15, i));
    drawGridLine(ctx, hPts);
    // Vertical line at x=i
    const vPts = [];
    for (let s = 0; s <= SEGS; s++) vPts.push(gridToCanvas(i, s / SEGS * 15));
    drawGridLine(ctx, vPts);
  }

  // Outer border lines (thicker, brighter)
  ctx.strokeStyle = 'rgba(0, 255, 0, 0.9)';
  ctx.lineWidth = 2;
  for (const i of [0, 15]) {
    const hPts = [];
    for (let s = 0; s <= SEGS; s++) hPts.push(gridToCanvas(s / SEGS * 15, i));
    drawGridLine(ctx, hPts);
    const vPts = [];
    for (let s = 0; s <= SEGS; s++) vPts.push(gridToCanvas(i, s / SEGS * 15));
    drawGridLine(ctx, vPts);
  }

  // Corner handles (draggable grid corners)
  for (let i = 0; i < 4; i++) {
    const [cx, cy] = imgToCanvas(corners[i][0], corners[i][1]);
    const isActive = i === dragging;

    ctx.beginPath();
    ctx.arc(cx, cy, isActive ? 18 : 14, 0, Math.PI * 2);
    ctx.fillStyle = isActive ? 'rgba(255, 255, 0, 0.9)' : 'rgba(0, 255, 0, 0.8)';
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// ── Touch/mouse dragging ──

function getEventPos(e) {
  const rect = overlay.getBoundingClientRect();
  if (e.touches) {
    return [e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top];
  }
  return [e.clientX - rect.left, e.clientY - rect.top];
}

function findNearestCorner(cx, cy) {
  if (!corners) return -1;
  let best = -1, bestDist = GRAB_RADIUS;
  for (let i = 0; i < 4; i++) {
    const [sx, sy] = imgToCanvas(corners[i][0], corners[i][1]);
    const d = Math.hypot(sx - cx, sy - cy);
    if (d < bestDist) { bestDist = d; best = i; }
  }
  return best;
}

function onPointerDown(e) {
  if (!corners) return;
  e.preventDefault();
  const [cx, cy] = getEventPos(e);
  dragging = findNearestCorner(cx, cy);
  if (dragging >= 0) drawAlignOverlay();
}

function onPointerMove(e) {
  if (dragging < 0) return;
  e.preventDefault();
  const [cx, cy] = getEventPos(e);
  const [ix, iy] = canvasToImg(cx, cy);
  corners[dragging] = [
    Math.max(0, Math.min(imageWidth, ix)),
    Math.max(0, Math.min(imageHeight, iy))
  ];
  drawAlignOverlay();
}

function onPointerUp(e) {
  if (dragging < 0) return;
  dragging = -1;
  drawAlignOverlay();
}

overlay.addEventListener('mousedown', onPointerDown);
overlay.addEventListener('mousemove', onPointerMove);
overlay.addEventListener('mouseup', onPointerUp);
overlay.addEventListener('touchstart', onPointerDown, { passive: false });
overlay.addEventListener('touchmove', onPointerMove, { passive: false });
overlay.addEventListener('touchend', onPointerUp);

// ── Scan with corners ──

scanBtn.addEventListener('click', async () => {
  if (!currentBlob || !corners) return;
  scanBtn.disabled = true;
  status.textContent = 'Scanning...';

  const form = new FormData();
  form.append('file', currentBlob, 'capture.jpg');
  form.append('corners', JSON.stringify(corners));

  try {
    const res = await fetch('/api/scan', { method: 'POST', body: form });
    const data = await res.json();
    if (data.error) {
      status.textContent = 'Error: ' + data.error;
    } else {
      originalScanResult = JSON.parse(JSON.stringify(data));
      currentBoardId = null;
      renderBoard(data);
      cameraWrap.style.borderColor = readinessColor(data.readiness_score);
      readinessScoreEl.textContent = 'Readiness: ' + (data.readiness_score * 100).toFixed(0) + '%';
      status.textContent = 'Done — tap any cell to edit';
    }
  } catch (e) {
    console.error('Scan error:', e);
    status.textContent = 'Error: ' + e.message;
  }
  scanBtn.disabled = false;
});

// ── Board state ──

let boardData = null;   // current board array 15x15
let confData = null;    // confidence array 15x15
let blankSet = new Set(); // set of "r,c" keys for blank tiles
let selectedCell = -1;  // flat index of selected cell
let originalScanResult = null; // deep copy of /api/scan response before user edits
let hasUnsavedEdits = false;
let currentBoardId = null;

const reviewBtn = $('review-btn');
const saveBtn = $('save-btn');
const copyBtn = $('copy-btn');
const downloadBtn = $('download-btn');
const viewSavedBtn = $('view-saved-btn');
const savedBoardsEl = $('saved-boards');
const savedListEl = $('saved-list');
const backFromSaved = $('back-from-saved');
const viewBar = $('view-bar');
const editBar = $('edit-bar');
const editLabel = $('edit-label');
const mobileInput = $('mobile-input');

function cellAt(r, c) { return boardGrid.children[r * 15 + c]; }

function markDirty() {
  hasUnsavedEdits = true;
  saveBtn.textContent = 'Save Board *';
  saveBtn.classList.add('save-dirty');
}

function markClean() {
  hasUnsavedEdits = false;
  saveBtn.textContent = 'Save Board';
  saveBtn.classList.remove('save-dirty');
}

function enterViewMode() {
  if (selectedCell >= 0 && boardGrid.children[selectedCell])
    boardGrid.children[selectedCell].classList.remove('selected');
  selectedCell = -1;
  editBar.classList.remove('visible');
  if (boardSection.classList.contains('visible'))
    viewBar.classList.add('visible');
}

function enterEditMode(idx) {
  if (selectedCell >= 0 && boardGrid.children[selectedCell])
    boardGrid.children[selectedCell].classList.remove('selected');
  selectedCell = idx;
  const el = boardGrid.children[idx];
  el.classList.add('selected');
  el.focus({ preventScroll: true });
  const r = Math.floor(idx / 15), c = idx % 15;
  editLabel.textContent = `(${r},${c})`;
  viewBar.classList.remove('visible');
  editBar.classList.add('visible');
}

function selectCell(idx) {
  if (idx >= 0 && boardGrid.children[idx]) {
    enterEditMode(idx);
  } else {
    enterViewMode();
  }
}

// Tap outside grid → return to view mode
document.addEventListener('click', e => {
  if (selectedCell < 0) return;
  if (!boardSection.classList.contains('visible')) return;
  // If click is inside a grid cell or inside the edit bar, stay in edit mode
  if (e.target.closest('.board-grid') || e.target.closest('#edit-bar') ||
      e.target.closest('#mobile-input')) return;
  enterViewMode();
});

function updateCellStyle(input, r, c) {
  input.classList.remove('has-tile', 'conf-low', 'conf-vlow', 'blank');
  const val = boardData[r][c];
  const isBlank = blankSet.has(`${r},${c}`);
  if (val !== '.') {
    input.classList.add('has-tile');
    const conf = confData[r][c];
    if (conf < 0.4) input.classList.add('conf-vlow');
    else if (conf < 0.7) input.classList.add('conf-low');
  }
  if (isBlank) input.classList.add('blank');
  input.value = val === '.' ? '' : (isBlank ? val.toLowerCase() + '*' : val);
}

// ── Board rendering ──

function renderBoard(data) {
  boardGrid.innerHTML = '';
  boardData = data.board.map(row => [...row]);
  confData = data.confidence.map(row => [...row]);
  blankSet = new Set();
  selectedCell = -1;

  for (let r = 0; r < 15; r++) {
    for (let c = 0; c < 15; c++) {
      const input = document.createElement('input');
      input.type = 'text';
      input.maxLength = 2;
      input.readOnly = true;
      input.dataset.r = r;
      input.dataset.c = c;
      input.title = `(${r},${c}) ${(confData[r][c] * 100).toFixed(0)}%`;
      updateCellStyle(input, r, c);

      input.addEventListener('click', () => selectCell(r * 15 + c));
      let lastTap = 0;
      input.addEventListener('touchend', e => {
        const now = Date.now();
        if (now - lastTap < 350) {
          e.preventDefault();
          toggleBlank(r, c);
        }
        lastTap = now;
      });
      input.addEventListener('dblclick', e => {
        e.preventDefault();
        toggleBlank(r, c);
      });
      boardGrid.appendChild(input);
    }
  }

  if (data.timings) {
    const t = data.timings;
    statsEl.textContent = `${data.tile_count} tiles | ${data.grid_method} grid | ` +
      `${t.total_ms.toFixed(0)}ms (grid ${t.grid_ms.toFixed(0)} + classify ${t.classify_ms.toFixed(0)})`;
  } else {
    statsEl.textContent = `${data.tile_count} tiles`;
  }

  editBar.classList.remove('visible');
  boardSection.classList.add('visible');
  viewBar.classList.add('visible');
  savedBoardsEl.classList.remove('visible');
  markClean();
}

// ── Keyboard navigation ──

document.addEventListener('keydown', e => {
  if (selectedCell < 0 || !boardSection.classList.contains('visible')) return;
  const r = Math.floor(selectedCell / 15);
  const c = selectedCell % 15;

  if (e.key === 'ArrowUp' && r > 0) { e.preventDefault(); selectCell((r - 1) * 15 + c); }
  else if (e.key === 'ArrowDown' && r < 14) { e.preventDefault(); selectCell((r + 1) * 15 + c); }
  else if (e.key === 'ArrowLeft' && c > 0) { e.preventDefault(); selectCell(r * 15 + c - 1); }
  else if (e.key === 'ArrowRight' && c < 14) { e.preventDefault(); selectCell(r * 15 + c + 1); }
  else if (e.key === 'Backspace' || e.key === 'Delete') {
    e.preventDefault();
    boardData[r][c] = '.';
    confData[r][c] = 1.0;
    blankSet.delete(`${r},${c}`);
    updateCellStyle(boardGrid.children[selectedCell], r, c);
    markDirty();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    enterViewMode();
  } else if (/^[a-zA-Z]$/.test(e.key)) {
    e.preventDefault();
    boardData[r][c] = e.key.toUpperCase();
    if (confData[r][c] < 1.0) confData[r][c] = 1.0;
    updateCellStyle(boardGrid.children[selectedCell], r, c);
    markDirty();
    if (c < 14) selectCell(r * 15 + c + 1);
  }
});

// ── Blank toggle ──

function toggleBlank(r, c) {
  const key = `${r},${c}`;
  if (boardData[r][c] === '.') return;
  if (blankSet.has(key)) blankSet.delete(key);
  else blankSet.add(key);
  updateCellStyle(cellAt(r, c), r, c);
  markDirty();
}

// ── Action bar (mobile) ──

$('kb-btn').addEventListener('click', () => {
  if (selectedCell < 0) return;
  mobileInput.value = '';
  mobileInput.focus();
});

mobileInput.addEventListener('input', () => {
  if (selectedCell < 0) return;
  const val = mobileInput.value.replace(/[^a-zA-Z]/g, '').toUpperCase();
  mobileInput.value = '';
  if (!val) return;
  const r = Math.floor(selectedCell / 15);
  const c = selectedCell % 15;
  boardData[r][c] = val[0];
  confData[r][c] = 1.0;
  updateCellStyle(boardGrid.children[selectedCell], r, c);
  markDirty();
  if (c < 14) selectCell(r * 15 + c + 1);
});

$('blank-btn').addEventListener('click', () => {
  if (selectedCell < 0) return;
  const r = Math.floor(selectedCell / 15);
  const c = selectedCell % 15;
  toggleBlank(r, c);
});

$('clear-btn').addEventListener('click', () => {
  if (selectedCell < 0) return;
  const r = Math.floor(selectedCell / 15);
  const c = selectedCell % 15;
  boardData[r][c] = '.';
  confData[r][c] = 1.0;
  blankSet.delete(`${r},${c}`);
  updateCellStyle(boardGrid.children[selectedCell], r, c);
  markDirty();
});

$('done-btn').addEventListener('click', enterViewMode);

// ── Review low confidence ──

let reviewIdx = -1;
reviewBtn.addEventListener('click', () => {
  if (!boardData) return;
  const lowCells = [];
  for (let r = 0; r < 15; r++)
    for (let c = 0; c < 15; c++)
      if (boardData[r][c] !== '.' && confData[r][c] < 0.7)
        lowCells.push(r * 15 + c);

  if (lowCells.length === 0) {
    status.textContent = 'No low-confidence cells to review';
    return;
  }
  reviewIdx = (reviewIdx + 1) % lowCells.length;
  selectCell(lowCells[reviewIdx]);
  status.textContent = `Review ${reviewIdx + 1}/${lowCells.length} — type to correct`;
});

// ── Export ──

function getBoardText() {
  if (!boardData) return '';
  return boardData.map((row, r) =>
    row.map((cell, c) => {
      if (cell === '.') return '.';
      return blankSet.has(`${r},${c}`) ? cell.toLowerCase() : cell;
    }).join('')
  ).join('\n');
}

function getBoardJSON() {
  return JSON.stringify({
    board: boardData,
    blanks: Array.from(blankSet).map(k => k.split(',').map(Number)),
    confidence: confData,
    timestamp: new Date().toISOString(),
  }, null, 2);
}

copyBtn.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(getBoardText());
    status.textContent = 'Board copied to clipboard';
  } catch { status.textContent = 'Copy failed — check permissions'; }
});

downloadBtn.addEventListener('click', () => {
  const blob = new Blob([getBoardJSON()], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'board.json';
  a.click();
});

// ── Save / Load boards ──

saveBtn.addEventListener('click', async () => {
  if (!boardData || !currentBlob) return;
  saveBtn.disabled = true;
  status.textContent = 'Saving...';

  const cornersAdjusted = autoDetectedCorners && corners
    ? corners.some((c, i) => Math.abs(c[0] - autoDetectedCorners[i][0]) > 1 ||
                              Math.abs(c[1] - autoDetectedCorners[i][1]) > 1)
    : corners !== null;

  const form = new FormData();
  form.append('file', currentBlob, 'capture.jpg');
  form.append('board', JSON.stringify(boardData));
  form.append('blanks', JSON.stringify(Array.from(blankSet).map(k => k.split(',').map(Number))));
  form.append('confidence', JSON.stringify(confData));
  form.append('auto_detected_corners', JSON.stringify(autoDetectedCorners));
  form.append('final_corners', JSON.stringify(corners));
  form.append('corners_were_adjusted', JSON.stringify(cornersAdjusted));
  form.append('original_scan', JSON.stringify(originalScanResult));
  if (currentBoardId) form.append('board_id', currentBoardId);

  try {
    const res = await fetch('/api/boards/save', { method: 'POST', body: form });
    const data = await res.json();
    currentBoardId = data.id;
    markClean();
    status.textContent = `Saved as "${data.name}"`;
  } catch (e) {
    status.textContent = 'Save failed: ' + e.message;
  }
  saveBtn.disabled = false;
});

viewSavedBtn.addEventListener('click', () => {
  enterViewMode();
  loadSavedBoards();
});
backFromSaved.addEventListener('click', () => {
  savedBoardsEl.classList.remove('visible');
  if (boardData) {
    boardSection.classList.add('visible');
    viewBar.classList.add('visible');
  }
});

async function loadSavedBoards() {
  boardSection.classList.remove('visible');
  viewBar.classList.remove('visible');
  editBar.classList.remove('visible');
  savedBoardsEl.classList.add('visible');
  savedListEl.innerHTML = '<div class="status">Loading...</div>';

  try {
    const res = await fetch('/api/boards');
    const data = await res.json();
    savedListEl.innerHTML = '';

    if (data.boards.length === 0) {
      savedListEl.innerHTML = '<div class="status">No saved boards yet</div>';
      return;
    }

    for (const b of data.boards) {
      const item = document.createElement('div');
      item.className = 'saved-item';
      const d = new Date(b.timestamp);
      item.innerHTML = `
        <img src="/api/boards/${b.id}/image" alt="Board">
        <div class="info">
          <div class="name">${b.name}</div>
          <div class="date">${d.toLocaleDateString()} ${d.toLocaleTimeString()}</div>
        </div>
        <button class="del-btn" data-id="${b.id}">&times;</button>
      `;
      item.querySelector('.info').addEventListener('click', () => openSavedBoard(b.id));
      item.querySelector('.del-btn').addEventListener('click', async e => {
        e.stopPropagation();
        if (!confirm('Delete this board?')) return;
        await fetch(`/api/boards/${b.id}`, { method: 'DELETE' });
        loadSavedBoards();
      });
      savedListEl.appendChild(item);
    }
  } catch (e) {
    savedListEl.innerHTML = `<div class="status">Error: ${e.message}</div>`;
  }
}

async function openSavedBoard(id) {
  try {
    const res = await fetch(`/api/boards/${id}`);
    const data = await res.json();
    const imgRes = await fetch(`/api/boards/${id}/image`);
    currentBlob = await imgRes.blob();
    currentBoardId = id;

    renderBoard({
      board: data.board,
      confidence: data.confidence || data.board.map(r => r.map(() => 1.0)),
      uncertain: [],
      tile_count: data.board.flat().filter(c => c !== '.').length,
      timings: null,
    });
    if (data.blanks) {
      blankSet = new Set(data.blanks.map(([r, c]) => `${r},${c}`));
      for (const [r, c] of data.blanks) updateCellStyle(cellAt(r, c), r, c);
    }
    if (data.final_corners) corners = data.final_corners;
    if (data.auto_detected_corners) autoDetectedCorners = data.auto_detected_corners;
    status.textContent = `Loaded "${data.name}" — edit and re-save`;
  } catch (e) {
    status.textContent = 'Load failed: ' + e.message;
  }
}

// ── Init ──

window.addEventListener('resize', () => {
  setupOverlay();
  if (corners) drawAlignOverlay();
  else if (video.srcObject) drawCameraGrid();
});

startCamera();
</script>

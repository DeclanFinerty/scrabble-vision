<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Corners</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #fff; }
  .top-bar {
    display: flex; align-items: center; gap: 16px; padding: 12px 20px;
    background: #222; border-bottom: 1px solid #444;
  }
  .top-bar h2 { font-size: 16px; flex: 1; }
  .top-bar button {
    padding: 8px 20px; font-size: 14px; font-weight: 600;
    border: none; border-radius: 6px; cursor: pointer; color: #fff;
  }
  .top-bar .save-btn { background: #4CAF50; }
  .top-bar .save-btn:disabled { opacity: 0.4; }
  .top-bar .back-btn { background: #555; }
  .top-bar .status { font-size: 13px; color: #aaa; }
  .editor {
    display: flex; justify-content: center; padding: 20px;
  }
  .canvas-wrap {
    position: relative; display: inline-block;
    cursor: crosshair;
  }
  .canvas-wrap img {
    display: block; max-width: 90vw; max-height: 80vh;
  }
  .canvas-wrap canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .info {
    text-align: center; padding: 8px; font-size: 13px; color: #888;
  }
  .corner-table {
    margin: 8px auto; border-collapse: collapse; font-size: 13px;
  }
  .corner-table td { padding: 4px 12px; }
  .corner-table .label { color: #4CAF50; font-weight: 600; }
</style>
</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="history.back()">&larr; Back</button>
  <h2 id="title">Edit Corners</h2>
  <span class="status" id="status"></span>
  <button class="save-btn" id="save-btn">Save Corners</button>
</div>

<div class="editor">
  <div class="canvas-wrap" id="canvas-wrap">
    <img id="board-img" />
    <canvas id="overlay"></canvas>
  </div>
</div>

<div class="info" id="info">
  Drag the 4 corner handles to align the grid with the board. Click Save when done.
</div>

<div class="info">
  <table class="corner-table" id="corner-table">
    <tr><td class="label">TL</td><td id="ct0"></td>
        <td class="label">TR</td><td id="ct1"></td></tr>
    <tr><td class="label">BR</td><td id="ct2"></td>
        <td class="label">BL</td><td id="ct3"></td></tr>
  </table>
</div>

<script>
const boardId = window.location.pathname.split('/')[2];
const img = document.getElementById('board-img');
const overlay = document.getElementById('overlay');
const statusEl = document.getElementById('status');
const saveBtn = document.getElementById('save-btn');

let corners = null;
let autoCorners = null;
let imgW = 0, imgH = 0;
let dragging = -1;
const GRAB_R = 20;

// ── Load board data ──

async function init() {
  const [metaRes, imgUrl] = await Promise.all([
    fetch(`/api/boards/${boardId}`),
    `/api/boards/${boardId}/image`
  ]);
  const meta = await metaRes.json();
  document.getElementById('title').textContent = `Edit Corners — ${meta.name || boardId}`;

  corners = meta.final_corners;
  autoCorners = meta.auto_detected_corners;

  img.src = imgUrl;
  img.onload = () => {
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    overlay.width = img.clientWidth;
    overlay.height = img.clientHeight;
    if (!corners) {
      // No saved corners — try auto-detected or default to image bounds
      corners = autoCorners || [[0,0],[imgW,0],[imgW,imgH],[0,imgH]];
    }
    draw();
    updateTable();
  };
}

// ── Coordinate transforms ──

function imgToCanvas(ix, iy) {
  return [ix / imgW * overlay.width, iy / imgH * overlay.height];
}
function canvasToImg(cx, cy) {
  return [cx / overlay.width * imgW, cy / overlay.height * imgH];
}

// ── Homography (same as main app) ──

function computeHomography(src, dst) {
  const A = [];
  for (let i = 0; i < 4; i++) {
    const [xs, ys] = src[i], [xd, yd] = dst[i];
    A.push([xs, ys, 1, 0, 0, 0, -xd*xs, -xd*ys, -xd]);
    A.push([0, 0, 0, xs, ys, 1, -yd*xs, -yd*ys, -yd]);
  }
  const M = [], b = [];
  for (let i = 0; i < 8; i++) { M.push(A[i].slice(0,8)); b.push(-A[i][8]); }
  for (let col = 0; col < 8; col++) {
    let mr = col, mv = Math.abs(M[col][col]);
    for (let r = col+1; r < 8; r++) if (Math.abs(M[r][col]) > mv) { mv = Math.abs(M[r][col]); mr = r; }
    [M[col], M[mr]] = [M[mr], M[col]]; [b[col], b[mr]] = [b[mr], b[col]];
    const p = M[col][col]; if (Math.abs(p) < 1e-12) return null;
    for (let j = col; j < 8; j++) M[col][j] /= p; b[col] /= p;
    for (let r = 0; r < 8; r++) { if (r===col) continue; const f=M[r][col];
      for (let j=col;j<8;j++) M[r][j]-=f*M[col][j]; b[r]-=f*b[col]; }
  }
  return [b[0],b[1],b[2],b[3],b[4],b[5],b[6],b[7],1];
}

function applyH(H, x, y) {
  const w = H[6]*x + H[7]*y + H[8];
  return [(H[0]*x+H[1]*y+H[2])/w, (H[3]*x+H[4]*y+H[5])/w];
}

// ── Drawing ──

function draw() {
  const ctx = overlay.getContext('2d');
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  if (!corners) return;

  const H = computeHomography([[0,0],[15,0],[15,15],[0,15]], corners);
  if (!H) return;

  function gridPt(gx, gy) {
    const [ix, iy] = applyH(H, gx, gy);
    return imgToCanvas(ix, iy);
  }

  const SEGS = 12;

  // Inner grid
  ctx.strokeStyle = 'rgba(0, 255, 0, 0.35)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 15; i++) {
    ctx.beginPath();
    for (let s = 0; s <= SEGS; s++) { const [x,y]=gridPt(s/SEGS*15, i); s===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
    ctx.stroke();
    ctx.beginPath();
    for (let s = 0; s <= SEGS; s++) { const [x,y]=gridPt(i, s/SEGS*15); s===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
    ctx.stroke();
  }

  // Outer border
  ctx.strokeStyle = 'rgba(0, 255, 0, 0.9)';
  ctx.lineWidth = 2;
  for (const i of [0, 15]) {
    ctx.beginPath();
    for (let s = 0; s <= SEGS; s++) { const [x,y]=gridPt(s/SEGS*15, i); s===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
    ctx.stroke();
    ctx.beginPath();
    for (let s = 0; s <= SEGS; s++) { const [x,y]=gridPt(i, s/SEGS*15); s===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
    ctx.stroke();
  }

  // Corner handles
  const labels = ['TL','TR','BR','BL'];
  for (let i = 0; i < 4; i++) {
    const [cx, cy] = imgToCanvas(corners[i][0], corners[i][1]);
    const active = i === dragging;
    ctx.beginPath();
    ctx.arc(cx, cy, active ? 12 : 8, 0, Math.PI*2);
    ctx.fillStyle = active ? 'rgba(255,255,0,0.9)' : 'rgba(0,255,0,0.8)';
    ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#000'; ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(labels[i], cx, cy);
  }
}

function updateTable() {
  if (!corners) return;
  for (let i = 0; i < 4; i++) {
    document.getElementById(`ct${i}`).textContent =
      `(${Math.round(corners[i][0])}, ${Math.round(corners[i][1])})`;
  }
}

// ── Dragging ──

function getPos(e) {
  const r = overlay.getBoundingClientRect();
  return [e.clientX - r.left, e.clientY - r.top];
}

function nearest(cx, cy) {
  let best = -1, bd = GRAB_R;
  for (let i = 0; i < 4; i++) {
    const [sx, sy] = imgToCanvas(corners[i][0], corners[i][1]);
    const d = Math.hypot(sx-cx, sy-cy);
    if (d < bd) { bd = d; best = i; }
  }
  return best;
}

overlay.addEventListener('mousedown', e => {
  const [cx, cy] = getPos(e);
  dragging = nearest(cx, cy);
  if (dragging >= 0) draw();
});

overlay.addEventListener('mousemove', e => {
  if (dragging < 0) return;
  const [cx, cy] = getPos(e);
  const [ix, iy] = canvasToImg(cx, cy);
  corners[dragging] = [Math.max(0, Math.min(imgW, ix)), Math.max(0, Math.min(imgH, iy))];
  draw();
  updateTable();
});

window.addEventListener('mouseup', () => {
  if (dragging < 0) return;
  dragging = -1;
  draw();
});

// ── Save ──

saveBtn.addEventListener('click', async () => {
  saveBtn.disabled = true;
  statusEl.textContent = 'Saving...';
  try {
    await fetch(`/api/boards/${boardId}/corners`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ final_corners: corners }),
    });
    statusEl.textContent = 'Corners saved.';
  } catch (e) {
    statusEl.textContent = 'Save failed: ' + e.message;
  }
  saveBtn.disabled = false;
});

// ── Resize ──

window.addEventListener('resize', () => {
  overlay.width = img.clientWidth;
  overlay.height = img.clientHeight;
  draw();
});

init();
</script>
</body>
</html>
